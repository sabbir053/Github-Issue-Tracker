<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- added daisyUI and Tailwind CSS Here -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- added daisyUI All themes here -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <!-- added Fontawesome cdn here -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header>
        <div
            class="navbar bg-base-100 shadow-sm px-5 py-3 flex flex-col md:flex-row md:justify-between md:items-center">

            <div class="flex items-center mb-3 md:mb-0">
                <img src="./assets/github-logo.png" alt="logo" class="h-[30px]">
                <a class="btn btn-ghost text-xl p-0 ml-2">GitHub Issues Tracker</a>
            </div>

            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                <label class="input validator w-full md:w-auto">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input id="btn-search" class="search-input w-full" type="text" placeholder="Search issues..." />
                </label>

                <button class="btn btn-primary w-full md:w-auto">+ New Issue</button>
            </div>
        </div>
    </header>

    <main class="bg-gray-100 pt-10">
        <section class="container mx-auto bg-white rounded-md p-5 shadow-md">
            <div class="space-x-3">
                <button class="filter-btn btn btn-outline bg-primary text-white" data-filter="all">All</button>
                <button class="filter-btn btn btn-outline" data-filter="open">Open</button>
                <button class="filter-btn btn btn-outline" data-filter="closed">Closed</button>
            </div>
        </section>

        <section class="container mx-auto md:mx-auto bg-white rounded-md p-5 mt-3 shadow-md">
            <div class="flex justify-between">
                <div class="flex space-x-2 items-center">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 id="issue-count" class="text-lg font-bold">0 Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="flex gap-2 items-center">
                        <i class="fa-solid fa-circle text-green-500"></i>
                        <p class="pr-4">Open</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <i class="fa-solid fa-circle text-purple-500"></i>
                        <p>Closed</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="container mx-auto bg-[#FBFBFB] rounded-md p-5 mt-3 shadow-md">

            <!-- Loading Spinner here -->
            <div id="loader" class="flex justify-center items-center py-10 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </div>

            <div id="all-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

            </div>

            <div id="open-cards" class="grid grid-cols-4 gap-3">

            </div>

            <!-- Open the modal method -->
            <dialog id="modal_details" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="details-container" class="border border-gray-200 rounded-lg space-y-5 p-5 m-3">
                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>

        </section>



    </main>

    <script src="./script/script.js"></script>
</body>

</html>
